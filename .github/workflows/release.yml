name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., 1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            # Get latest tag or default to 1.0.0
            LATEST=$(git tag -l 'v*' | sort -V | tail -n1 || echo "")
            if [[ -z "$LATEST" ]]; then
              VERSION="1.0.0"
            else
              # Bump patch version
              VERSION=$(echo "$LATEST" | sed 's/^v//' | awk -F. '{print $1"."$2"."$3+1}')
            fi
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major=$(echo $VERSION | cut -d. -f1)" >> "$GITHUB_OUTPUT"

      - name: Check if tag exists
        id: check
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="v${{ steps.version.outputs.version }}"
          MAJOR="v${{ steps.version.outputs.major }}"

          # Create the release with semantic version tag
          gh release create "$VERSION" \
            --title "$VERSION" \
            --generate-notes

          # Update major version tag to point to this release
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Delete existing major tag if it exists (locally and remotely)
          git tag -d "$MAJOR" 2>/dev/null || true
          git push origin --delete "$MAJOR" 2>/dev/null || true

          # Create new major tag pointing to this commit
          git tag "$MAJOR"
          git push origin "$MAJOR"

          echo "Released $VERSION and updated $MAJOR tag"
